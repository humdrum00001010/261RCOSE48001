notes_en = "Based on the structure of the Korea Fair Trade Commission's standard form franchise agreement (가맹사업 표준계약서). Captures territory, term, initial and continuing franchise fees, IP licence, supply, training, renewal and termination rights mandated by the Franchise Business Act (가맹사업거래의 공정화에 관한 법률)."
notes_ko = "공정거래위원회 가맹사업 표준계약서를 기준으로 합니다. 영업지역, 가맹기간, 가맹금, 상표 사용권, 물품 공급, 교육, 갱신 및 해지 조항을 포함합니다."

